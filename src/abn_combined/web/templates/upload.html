{% extends "base.html" %}
{% block title %}Upload — abn-combined{% endblock %}
{% block content %}
<hgroup>
  <h1>Upload a statement</h1>
  <p>MT940/STA, ABN XLS, generic CSV, PayPal TXT, Wise CSV, or SEB CSV.</p>
</hgroup>

<form
  id="upload-form"
  hx-post="/api/upload"
  hx-encoding="multipart/form-data"
  hx-target="#upload-result"
  hx-swap="innerHTML"
  hx-indicator="#upload-spinner">
  <label>
    File
    <input type="file" name="file" required>
  </label>
  <label>
    Format
    <select name="format">
      <option value="auto">Auto-detect (MT940 / XLS / CSV)</option>
      <option value="paypal">PayPal activity report (.TXT)</option>
      <option value="wise">Wise transaction history (.csv)</option>
      <option value="seb">SEB kontoutdrag (.csv)</option>
      <option value="csv">Generic CSV</option>
    </select>
    <small>PayPal, Wise and SEB files must select their format explicitly.</small>
  </label>
  <button type="submit">Import</button>
  <span id="upload-spinner" class="htmx-indicator" aria-busy="true">Importing…</span>
</form>

<div id="upload-result"></div>
{% endblock %}
