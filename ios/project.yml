name: DVMFinance
options:
  bundleIdPrefix: com.dvm
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  # Xcode manages one auto-created scheme for the DVMFinance target when the
  # project is first opened; that scheme's Test action picks up the local
  # DVMFinanceKit package's test target automatically once Xcode resolves
  # the package dependency below. See README.md "Running tests".

configs:
  Debug: debug
  Release: release

packages:
  DVMFinanceKit:
    path: DVMFinanceKit

targets:
  DVMFinance:
    type: application
    platform: iOS
    sources:
      - path: DVMFinance
    dependencies:
      - package: DVMFinanceKit
        product: DVMFinanceKit
    settings:
      base:
        PRODUCT_NAME: DVMFinance
        PRODUCT_BUNDLE_IDENTIFIER: com.dvm.finance
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        # No shared team id is checked in; set your personal team in Xcode's
        # Signing & Capabilities tab after `xcodegen generate` (see README).
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "DVM Finance"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
